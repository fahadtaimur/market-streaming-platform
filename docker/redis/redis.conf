# Redis configuration
bind 0.0.0.0
port 6379

# Persistence: append-only log so stream data survives container restarts
appendonly yes
appendfilename "appendonly.aof"

# no memory limit locally, for production use these
# maxmemory 256mb
# maxmemory-policy allkeys-lru

# Stream-specific: max entries per stream key (0 = unlimited locally)
# stream-node-max-entries 100
